<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cellBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="50%" stop-color="#0f1830"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="cathode" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="anode" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a7abf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a4a7f" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="140" ry="110" fill="url(#glow)"/>

  <!-- Battery cell outer shell -->
  <rect x="100" y="55" width="200" height="195" rx="12" fill="url(#cellBody)" stroke="#d4af55" stroke-width="2.5" stroke-opacity="0.85"/>

  <!-- Positive terminal cap (top) -->
  <rect x="145" y="42" width="110" height="18" rx="5" fill="rgba(212,175,85,0.2)" stroke="#d4af55" stroke-width="2" stroke-opacity="0.9"/>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#d4af55" opacity="0.9">+</text>

  <!-- Negative terminal (bottom implied by body bottom) -->
  <rect x="145" y="245" width="110" height="12" rx="4" fill="rgba(100,130,200,0.2)" stroke="#7090c0" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="200" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7090c0" opacity="0.8">-</text>

  <!-- Internal cross-section layers -->
  <!-- Cathode layer (gold, right) -->
  <rect x="230" y="70" width="55" height="165" rx="4" fill="url(#cathode)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>
  <text x="257" y="152" text-anchor="middle" font-family="monospace" font-size="7" fill="#d4af55" opacity="0.7" transform="rotate(90,257,152)">CATHODE (+)</text>

  <!-- Separator layer (thin, center) -->
  <rect x="192" y="70" width="10" height="165" fill="rgba(245,240,225,0.08)" stroke="rgba(245,240,225,0.3)" stroke-width="1"/>

  <!-- Anode layer (blue-ish, left) -->
  <rect x="115" y="70" width="55" height="165" rx="4" fill="url(#anode)" stroke="rgba(100,140,210,0.4)" stroke-width="1"/>
  <text x="142" y="152" text-anchor="middle" font-family="monospace" font-size="7" fill="#7090d0" opacity="0.7" transform="rotate(90,142,152)">ANODE (-)</text>

  <!-- Li+ ions flowing left to right (discharge) -->
  <g fill="#d4af55" font-family="monospace" font-size="10" font-weight="bold">
    <text x="197" y="100" text-anchor="middle" opacity="0.8">Li⁺</text>
    <text x="197" y="125" text-anchor="middle" opacity="0.7">Li⁺</text>
    <text x="197" y="175" text-anchor="middle" opacity="0.7">Li⁺</text>
    <text x="197" y="200" text-anchor="middle" opacity="0.8">Li⁺</text>
  </g>
  <!-- Ion arrows -->
  <g stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arr)">
    <line x1="207" y1="97" x2="225" y2="97"/>
    <line x1="207" y1="122" x2="225" y2="122"/>
    <line x1="207" y1="172" x2="225" y2="172"/>
    <line x1="207" y1="197" x2="225" y2="197"/>
  </g>
  <g fill="#d4af55" opacity="0.55">
    <polygon points="225,94 232,97 225,100"/>
    <polygon points="225,119 232,122 225,125"/>
    <polygon points="225,169 232,172 225,175"/>
    <polygon points="225,194 232,197 225,200"/>
  </g>

  <!-- e- electron flow arrows (external) -->
  <path d="M 100 100 C 70 100, 55 150, 70 200 L 100 200"
        fill="none" stroke="#7090d0" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="5,3"/>
  <polygon points="100,197 93,204 100,210" fill="#7090d0" opacity="0.6"/>
  <text x="52" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#7090d0" opacity="0.7">e⁻</text>

  <!-- Lightning bolt center -->
  <path d="M 203 115 L 194 148 L 201 148 L 192 180 L 208 145 L 201 145 Z"
        fill="#d4af55" opacity="0.85"/>

  <!-- Bottom label -->
  <text x="200" y="285" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4af55" opacity="0.85" letter-spacing="1">Li-ION BATTERY</text>
  <line x1="90" y1="275" x2="310" y2="275" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
