<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="175" rx="165" ry="105" fill="url(#glow)"/>

  <!-- Ground line -->
  <line x1="40" y1="235" x2="360" y2="235" stroke="rgba(212,175,85,0.35)" stroke-width="1.5"/>

  <!-- BENZ PATENT-MOTORWAGEN 1886 - Three-wheeled vehicle, side view -->

  <!-- Rear large wheel (right) -->
  <circle cx="295" cy="220" r="45" fill="none" stroke="#d4af55" stroke-width="2.5" stroke-opacity="0.85"/>
  <!-- Rear wheel spokes -->
  <g stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7" transform="translate(295,220)">
    <line x1="0" y1="-45" x2="0" y2="45"/>
    <line x1="-45" y1="0" x2="45" y2="0"/>
    <line x1="-32" y1="-32" x2="32" y2="32"/>
    <line x1="32" y1="-32" x2="-32" y2="32"/>
    <line x1="-20" y1="-40" x2="20" y2="40"/>
    <line x1="20" y1="-40" x2="-20" y2="40"/>
    <line x1="-40" y1="-20" x2="40" y2="20"/>
    <line x1="-40" y1="20" x2="40" y2="-20"/>
    <circle cx="0" cy="0" r="5" fill="#d4af55" opacity="0.85"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Front small wheel (left, single) -->
  <circle cx="110" cy="225" r="32" fill="none" stroke="#d4af55" stroke-width="2.5" stroke-opacity="0.85"/>
  <!-- Front wheel spokes -->
  <g stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7" transform="translate(110,225)">
    <line x1="0" y1="-32" x2="0" y2="32"/>
    <line x1="-32" y1="0" x2="32" y2="0"/>
    <line x1="-23" y1="-23" x2="23" y2="23"/>
    <line x1="23" y1="-23" x2="-23" y2="23"/>
    <circle cx="0" cy="0" r="4" fill="#d4af55" opacity="0.85"/>
  </g>

  <!-- Front fork/steering column -->
  <line x1="110" y1="193" x2="118" y2="165" stroke="#d4af55" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="118" y1="165" x2="145" y2="160" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Tiller steering bar -->
  <line x1="145" y1="160" x2="160" y2="148" stroke="#f5f0e1" stroke-width="2" stroke-opacity="0.75"/>
  <!-- Tiller handle -->
  <circle cx="160" cy="147" r="4" fill="#d4af55" opacity="0.7"/>

  <!-- Main frame / chassis tubes -->
  <!-- Main longitudinal tube -->
  <line x1="110" y1="195" x2="295" y2="195" stroke="#d4af55" stroke-width="3" stroke-opacity="0.8"/>
  <!-- Lower longitudinal tube -->
  <line x1="120" y1="210" x2="290" y2="210" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Cross members -->
  <line x1="165" y1="195" x2="165" y2="210" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="200" y1="195" x2="200" y2="210" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="240" y1="195" x2="240" y2="210" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Seat support frame -->
  <line x1="205" y1="195" x2="200" y2="165" stroke="#d4af55" stroke-width="2" stroke-opacity="0.75"/>
  <line x1="230" y1="195" x2="225" y2="165" stroke="#d4af55" stroke-width="2" stroke-opacity="0.75"/>
  <!-- Seat back -->
  <path d="M 200 165 L 198 148 L 228 148 L 225 165" fill="rgba(212,175,85,0.1)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.75"/>
  <!-- Seat cushion -->
  <path d="M 200 165 Q 213 168, 225 165" fill="none" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Engine (mounted behind seat) -->
  <!-- Engine block -->
  <rect x="240" y="160" width="35" height="35" rx="3" fill="rgba(15,22,40,0.9)" stroke="#d4af55" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Cylinder -->
  <rect x="250" y="148" width="12" height="16" rx="3" fill="rgba(15,22,40,0.85)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8"/>
  <!-- Cooling fins -->
  <g stroke="#d4af55" stroke-width="1" stroke-opacity="0.5">
    <line x1="248" y1="150" x2="264" y2="150"/>
    <line x1="248" y1="153" x2="264" y2="153"/>
    <line x1="248" y1="156" x2="264" y2="156"/>
    <line x1="248" y1="159" x2="264" y2="159"/>
  </g>
  <!-- Flywheel -->
  <circle cx="275" cy="177" r="14" fill="none" stroke="#d4af55" stroke-width="2" stroke-opacity="0.75"/>
  <circle cx="275" cy="177" r="5" fill="rgba(212,175,85,0.2)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Connecting rod hint -->
  <line x1="263" y1="170" x2="275" y2="177" stroke="#f5f0e1" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Fuel tank / battery box -->
  <rect x="165" y="180" width="30" height="15" rx="3" fill="rgba(212,175,85,0.1)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.65"/>

  <!-- Chain drive -->
  <path d="M 279 190 C 285 195, 290 200, 295 200" fill="none" stroke="#f5f0e1" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Year text -->
  <text x="200" y="260" text-anchor="middle" font-family="serif" font-size="10" fill="#f5f0e1" opacity="0.55" letter-spacing="1">BENZ PATENT-MOTORWAGEN</text>

  <!-- Bottom label -->
  <text x="200" y="283" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4af55" opacity="0.85" letter-spacing="2">AUTOMOBILE  1886</text>
  <line x1="90" y1="273" x2="310" y2="273" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
