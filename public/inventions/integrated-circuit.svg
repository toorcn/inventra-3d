<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dieGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="155" ry="120" fill="url(#glow)"/>

  <!-- PCB substrate hint -->
  <rect x="30" y="30" width="340" height="240" rx="8" fill="rgba(10,20,15,0.4)" stroke="rgba(212,175,85,0.1)" stroke-width="1"/>

  <!-- Chip package (black body) -->
  <rect x="115" y="70" width="170" height="160" rx="6" fill="rgba(8,10,18,0.97)" stroke="#d4af55" stroke-width="2.5" stroke-opacity="0.85"/>
  <!-- Package top-left notch -->
  <path d="M 140 70 Q 145 63, 150 70" fill="none" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Die (silicon chip inside) -->
  <rect x="133" y="88" width="134" height="124" rx="3" fill="rgba(15,22,42,0.95)" stroke="rgba(212,175,85,0.35)" stroke-width="1"/>
  <!-- Die glow -->
  <rect x="133" y="88" width="134" height="124" rx="3" fill="url(#dieGlow)"/>

  <!-- Internal circuit traces - horizontal buses -->
  <g stroke="rgba(212,175,85,0.4)" stroke-width="1" fill="none">
    <line x1="133" y1="105" x2="267" y2="105"/>
    <line x1="133" y1="120" x2="267" y2="120"/>
    <line x1="133" y1="150" x2="267" y2="150"/>
    <line x1="133" y1="180" x2="267" y2="180"/>
    <line x1="133" y1="195" x2="267" y2="195"/>
    <!-- Vertical buses -->
    <line x1="155" y1="88" x2="155" y2="212"/>
    <line x1="175" y1="88" x2="175" y2="212"/>
    <line x1="200" y1="88" x2="200" y2="212"/>
    <line x1="225" y1="88" x2="225" y2="212"/>
    <line x1="245" y1="88" x2="245" y2="212"/>
  </g>

  <!-- Logic gate: AND gate (left area) -->
  <path d="M 140 130 L 140 145 L 148 145 Q 158 145, 158 137.5 Q 158 130, 148 130 Z"
        fill="rgba(212,175,85,0.1)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="133" y1="133" x2="140" y2="133" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="133" y1="142" x2="140" y2="142" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="158" y1="137" x2="165" y2="137" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Logic gate: OR gate (center-right) -->
  <path d="M 210 128 C 210 128, 213 128, 215 130 C 222 130, 228 133, 228 137 C 228 141, 222 144, 215 144 C 213 146, 210 146, 210 146 C 213 141, 213 133, 210 128 Z"
        fill="rgba(212,175,85,0.1)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="200" y1="131" x2="210" y2="131" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="200" y1="143" x2="210" y2="143" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="228" y1="137" x2="235" y2="137" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>

  <!-- NOT gate (triangle with bubble) -->
  <path d="M 155 165 L 155 177 L 165 171 Z"
        fill="rgba(212,175,85,0.1)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8"/>
  <circle cx="167" cy="171" r="2.5" fill="none" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="148" y1="171" x2="155" y2="171" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="170" y1="171" x2="175" y2="171" stroke="#d4af55" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Capacitor symbol -->
  <line x1="228" y1="168" x2="228" y2="176" stroke="#d4af55" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="235" y1="168" x2="235" y2="176" stroke="#d4af55" stroke-width="2" stroke-opacity="0.8"/>
  <line x1="222" y1="172" x2="228" y2="172" stroke="#d4af55" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="235" y1="172" x2="241" y2="172" stroke="#d4af55" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Resistor symbol -->
  <rect x="243" y="165" width="14" height="7" rx="1" fill="rgba(8,10,18,0.9)" stroke="#f5f0e1" stroke-width="1.2" stroke-opacity="0.65"/>
  <line x1="241" y1="168" x2="243" y2="168" stroke="#f5f0e1" stroke-width="1" stroke-opacity="0.65"/>
  <line x1="257" y1="168" x2="260" y2="168" stroke="#f5f0e1" stroke-width="1" stroke-opacity="0.65"/>

  <!-- Bond wires (tiny curves from die edge to pins) -->
  <g stroke="rgba(245,240,225,0.3)" stroke-width="0.8" fill="none">
    <path d="M 133 105 Q 128 105, 120 105"/>
    <path d="M 133 120 Q 128 120, 120 120"/>
    <path d="M 133 150 Q 128 150, 120 150"/>
    <path d="M 133 180 Q 128 180, 120 180"/>
    <path d="M 133 195 Q 128 195, 120 195"/>
    <path d="M 267 105 Q 272 105, 280 105"/>
    <path d="M 267 120 Q 272 120, 280 120"/>
    <path d="M 267 150 Q 272 150, 280 150"/>
    <path d="M 267 180 Q 272 180, 280 180"/>
    <path d="M 267 195 Q 272 195, 280 195"/>
  </g>

  <!-- Pins LEFT side -->
  <g fill="rgba(212,175,85,0.15)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8">
    <rect x="95" y="100" width="20" height="10" rx="2"/>
    <rect x="95" y="115" width="20" height="10" rx="2"/>
    <rect x="95" y="145" width="20" height="10" rx="2"/>
    <rect x="95" y="175" width="20" height="10" rx="2"/>
    <rect x="95" y="190" width="20" height="10" rx="2"/>
  </g>
  <!-- Traces to left pins -->
  <g stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.6">
    <line x1="115" y1="105" x2="133" y2="105"/>
    <line x1="115" y1="120" x2="133" y2="120"/>
    <line x1="115" y1="150" x2="133" y2="150"/>
    <line x1="115" y1="180" x2="133" y2="180"/>
    <line x1="115" y1="195" x2="133" y2="195"/>
  </g>

  <!-- Pins RIGHT side -->
  <g fill="rgba(212,175,85,0.15)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8">
    <rect x="285" y="100" width="20" height="10" rx="2"/>
    <rect x="285" y="115" width="20" height="10" rx="2"/>
    <rect x="285" y="145" width="20" height="10" rx="2"/>
    <rect x="285" y="175" width="20" height="10" rx="2"/>
    <rect x="285" y="190" width="20" height="10" rx="2"/>
  </g>
  <!-- Traces to right pins -->
  <g stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.6">
    <line x1="267" y1="105" x2="285" y2="105"/>
    <line x1="267" y1="120" x2="285" y2="120"/>
    <line x1="267" y1="150" x2="285" y2="150"/>
    <line x1="267" y1="180" x2="285" y2="180"/>
    <line x1="267" y1="195" x2="285" y2="195"/>
  </g>

  <!-- Pins TOP side -->
  <g fill="rgba(212,175,85,0.15)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8">
    <rect x="148" y="50" width="10" height="20" rx="2"/>
    <rect x="168" y="50" width="10" height="20" rx="2"/>
    <rect x="193" y="50" width="10" height="20" rx="2"/>
    <rect x="218" y="50" width="10" height="20" rx="2"/>
    <rect x="238" y="50" width="10" height="20" rx="2"/>
  </g>

  <!-- Pins BOTTOM side -->
  <g fill="rgba(212,175,85,0.15)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.8">
    <rect x="148" y="230" width="10" height="20" rx="2"/>
    <rect x="168" y="230" width="10" height="20" rx="2"/>
    <rect x="193" y="230" width="10" height="20" rx="2"/>
    <rect x="218" y="230" width="10" height="20" rx="2"/>
    <rect x="238" y="230" width="10" height="20" rx="2"/>
  </g>

  <!-- Chip label -->
  <text x="200" y="208" text-anchor="middle" font-family="monospace" font-size="8" fill="#d4af55" opacity="0.7">IC-7400</text>

  <!-- Bottom label -->
  <text x="200" y="285" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4af55" opacity="0.85" letter-spacing="1">INTEGRATED CIRCUIT</text>
  <line x1="78" y1="275" x2="322" y2="275" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
