<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="160" ry="120" fill="url(#glow)"/>

  <!-- Left DNA helix strand 1 (gold) -->
  <path d="M 60 30 C 90 50, 110 80, 90 110 C 70 140, 60 155, 90 175"
        fill="none" stroke="#d4af55" stroke-width="3" stroke-opacity="0.9"/>
  <!-- Left DNA helix strand 2 (cream) -->
  <path d="M 100 30 C 70 50, 50 80, 70 110 C 90 140, 100 155, 70 175"
        fill="none" stroke="#f5f0e1" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Left rungs -->
  <line x1="63" y1="50" x2="97" y2="50" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="57" y1="70" x2="103" y2="70" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="60" y1="90" x2="100" y2="90" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="73" y1="110" x2="87" y2="110" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="83" y1="130" x2="77" y2="130" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="90" y1="150" x2="70" y2="150" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="90" y1="170" x2="70" y2="170" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Right DNA helix strand 1 (gold) -->
  <path d="M 300 125 C 330 145, 350 175, 330 200 C 310 225, 300 240, 330 260"
        fill="none" stroke="#d4af55" stroke-width="3" stroke-opacity="0.9"/>
  <!-- Right DNA helix strand 2 (cream) -->
  <path d="M 340 125 C 310 145, 290 175, 310 200 C 330 225, 340 240, 310 260"
        fill="none" stroke="#f5f0e1" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Right rungs -->
  <line x1="303" y1="145" x2="337" y2="145" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="297" y1="165" x2="343" y2="165" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="300" y1="185" x2="340" y2="185" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="313" y1="205" x2="327" y2="205" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="323" y1="225" x2="317" y2="225" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="330" y1="245" x2="310" y2="245" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Cut gap / break zone in center -->
  <rect x="130" y="85" width="140" height="130" rx="8" fill="rgba(212,175,85,0.06)" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>

  <!-- Broken strand ends (left side of cut) -->
  <path d="M 90 175 C 110 185, 125 190, 140 188"
        fill="none" stroke="#d4af55" stroke-width="3" stroke-opacity="0.9" stroke-dasharray="4,3"/>
  <path d="M 70 175 C 90 185, 105 192, 140 200"
        fill="none" stroke="#f5f0e1" stroke-width="3" stroke-opacity="0.7" stroke-dasharray="4,3"/>

  <!-- Broken strand ends (right side of cut) -->
  <path d="M 260 112 C 275 118, 290 122, 300 125"
        fill="none" stroke="#d4af55" stroke-width="3" stroke-opacity="0.9" stroke-dasharray="4,3"/>
  <path d="M 260 120 C 275 122, 290 124, 340 125"
        fill="none" stroke="#f5f0e1" stroke-width="3" stroke-opacity="0.7" stroke-dasharray="4,3"/>

  <!-- Scissors - left blade -->
  <g transform="translate(200, 150) rotate(-20)">
    <ellipse cx="-18" cy="0" rx="22" ry="7" fill="none" stroke="#f5f0e1" stroke-width="2.5" stroke-opacity="0.85"/>
    <line x1="-40" y1="0" x2="10" y2="0" stroke="#f5f0e1" stroke-width="2.5" stroke-opacity="0.85"/>
    <!-- Screw/pivot -->
    <circle cx="10" cy="0" r="4" fill="#d4af55" stroke="#f5f0e1" stroke-width="1.5"/>
  </g>
  <!-- Scissors - right blade -->
  <g transform="translate(200, 150) rotate(20)">
    <ellipse cx="-18" cy="0" rx="22" ry="7" fill="none" stroke="#f5f0e1" stroke-width="2.5" stroke-opacity="0.85"/>
    <line x1="-40" y1="0" x2="10" y2="0" stroke="#f5f0e1" stroke-width="2.5" stroke-opacity="0.85"/>
  </g>

  <!-- Cas9 protein blob hinting -->
  <ellipse cx="200" cy="150" rx="45" ry="35" fill="rgba(212,175,85,0.08)" stroke="rgba(212,175,85,0.25)" stroke-width="1.5"/>

  <!-- Guide RNA squiggle -->
  <path d="M 200 120 Q 215 115, 220 105 Q 225 95, 240 92 Q 255 89, 258 80"
        fill="none" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="3,2"/>

  <!-- Label -->
  <text x="200" y="278" text-anchor="middle" font-family="monospace" font-size="13" fill="#d4af55" opacity="0.85" letter-spacing="2">CRISPR-Cas9</text>
  <line x1="100" y1="268" x2="300" y2="268" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
