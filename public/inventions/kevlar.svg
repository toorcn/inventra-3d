<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="impactGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#d4af55" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
    <!-- Kevlar weave pattern -->
    <pattern id="kevlarWeave" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <!-- Warp (vertical) fibers -->
      <rect x="0" y="0" width="8" height="10" rx="1" fill="rgba(35,50,30,0.9)"/>
      <rect x="0" y="10" width="8" height="10" rx="1" fill="rgba(28,42,24,0.9)"/>
      <!-- Weft (horizontal) fibers on top -->
      <rect x="0" y="0" width="10" height="8" rx="1" fill="rgba(55,75,40,0.85)"/>
      <rect x="10" y="10" width="10" height="8" rx="1" fill="rgba(48,68,35,0.85)"/>
      <!-- Interlacing highlights -->
      <rect x="1" y="1" width="6" height="2" rx="0.5" fill="rgba(120,160,60,0.2)"/>
      <rect x="11" y="11" width="6" height="2" rx="0.5" fill="rgba(120,160,60,0.2)"/>
    </pattern>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Kevlar weave background -->
  <rect width="400" height="300" fill="url(#kevlarWeave)"/>

  <!-- Gold fiber highlight lines (diagonal) -->
  <g stroke="#d4af55" stroke-width="1.2" stroke-opacity="0.3">
    <!-- NE diagonals (warp direction) -->
    <line x1="-10" y1="310" x2="310" y2="-10"/>
    <line x1="20" y1="310" x2="340" y2="-10"/>
    <line x1="50" y1="310" x2="370" y2="-10"/>
    <line x1="80" y1="310" x2="400" y2="-10"/>
    <line x1="-40" y1="310" x2="280" y2="-10"/>
    <line x1="-70" y1="310" x2="250" y2="-10"/>
    <line x1="-100" y1="310" x2="220" y2="-10"/>
    <line x1="-130" y1="310" x2="190" y2="-10"/>
  </g>
  <g stroke="#d4af55" stroke-width="1.2" stroke-opacity="0.18">
    <!-- NW diagonals (weft direction) -->
    <line x1="410" y1="310" x2="90" y2="-10"/>
    <line x1="380" y1="310" x2="60" y2="-10"/>
    <line x1="350" y1="310" x2="30" y2="-10"/>
    <line x1="320" y1="310" x2="0" y2="-10"/>
    <line x1="440" y1="310" x2="120" y2="-10"/>
    <line x1="470" y1="310" x2="150" y2="-10"/>
    <line x1="500" y1="310" x2="180" y2="-10"/>
  </g>

  <!-- Impact ripple circles -->
  <ellipse cx="200" cy="150" rx="160" ry="140" fill="url(#impactGlow)"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="rgba(212,175,85,0.15)" stroke-width="1.5"/>
  <circle cx="200" cy="150" r="70" fill="none" stroke="rgba(212,175,85,0.2)" stroke-width="1.5"/>
  <circle cx="200" cy="150" r="45" fill="none" stroke="rgba(212,175,85,0.28)" stroke-width="2"/>

  <!-- Deformation/bulge area -->
  <ellipse cx="200" cy="150" rx="28" ry="25" fill="rgba(212,175,85,0.12)" stroke="rgba(212,175,85,0.5)" stroke-width="2"/>

  <!-- Bullet (stopped/embedded) -->
  <!-- Bullet body -->
  <path d="M 178 143 L 178 158 C 178 163, 195 167, 200 167 C 205 167, 222 163, 222 158 L 222 143 Z"
        fill="rgba(180,160,100,0.9)" stroke="#d4af55" stroke-width="1.5"/>
  <!-- Bullet nose (ogive) -->
  <path d="M 178 143 C 178 135, 186 128, 200 126 C 214 128, 222 135, 222 143 Z"
        fill="rgba(212,185,120,0.95)" stroke="#d4af55" stroke-width="1.5"/>
  <!-- Bullet groove / cannelure -->
  <line x1="178" y1="153" x2="222" y2="153" stroke="rgba(100,85,50,0.6)" stroke-width="2"/>
  <!-- Bullet tip shine -->
  <path d="M 191 131 C 193 129, 197 127, 200 127" fill="none" stroke="rgba(255,245,200,0.4)" stroke-width="1.5"/>
  <!-- Bullet base -->
  <line x1="178" y1="158" x2="222" y2="158" stroke="rgba(100,85,50,0.5)" stroke-width="1.5"/>

  <!-- Fiber deformation lines radiating from bullet -->
  <g stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.45">
    <line x1="200" y1="125" x2="200" y2="95"/>
    <line x1="222" y1="143" x2="248" y2="130"/>
    <line x1="222" y1="158" x2="248" y2="170"/>
    <line x1="200" y1="167" x2="200" y2="197"/>
    <line x1="178" y1="158" x2="152" y2="170"/>
    <line x1="178" y1="143" x2="152" y2="130"/>
    <!-- Diagonal deformation -->
    <line x1="214" y1="130" x2="235" y2="108"/>
    <line x1="186" y1="130" x2="165" y2="108"/>
    <line x1="214" y1="162" x2="235" y2="184"/>
    <line x1="186" y1="162" x2="165" y2="184"/>
  </g>

  <!-- Impact star cracks in material -->
  <g stroke="rgba(212,175,85,0.35)" stroke-width="1" fill="none">
    <line x1="200" y1="110" x2="205" y2="125"/>
    <line x1="220" y1="118" x2="215" y2="130"/>
    <line x1="238" y1="140" x2="225" y2="145"/>
    <line x1="230" y1="164" x2="220" y2="158"/>
    <line x1="200" y1="182" x2="200" y2="168"/>
    <line x1="170" y1="164" x2="180" y2="158"/>
    <line x1="162" y1="140" x2="175" y2="145"/>
    <line x1="178" y1="118" x2="185" y2="130"/>
  </g>

  <!-- KEVLAR text watermark in weave -->
  <text x="200" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(212,175,85,0.3)" letter-spacing="8">K E V L A R</text>

  <!-- Vignette -->
  <radialGradient id="vignette2" cx="50%" cy="50%" r="70%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(10,11,20,0.65)"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#vignette2)"/>

  <!-- Bottom label -->
  <text x="200" y="278" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4af55" opacity="0.85" letter-spacing="2">KEVLAR</text>
  <line x1="130" y1="268" x2="270" y2="268" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
