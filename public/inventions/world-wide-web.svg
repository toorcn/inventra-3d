<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="148" rx="155" ry="130" fill="url(#glow)"/>

  <!-- Globe outline -->
  <circle cx="200" cy="148" r="105" fill="none" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Latitude lines -->
  <ellipse cx="200" cy="148" rx="105" ry="30" fill="none" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
  <ellipse cx="200" cy="148" rx="105" ry="65" fill="none" stroke="rgba(212,175,85,0.2)" stroke-width="1"/>
  <line x1="95" y1="148" x2="305" y2="148" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
  <!-- Longitude lines -->
  <ellipse cx="200" cy="148" rx="45" ry="105" fill="none" stroke="rgba(212,175,85,0.2)" stroke-width="1"/>
  <ellipse cx="200" cy="148" rx="80" ry="105" fill="none" stroke="rgba(212,175,85,0.2)" stroke-width="1"/>
  <line x1="200" y1="43" x2="200" y2="253" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>

  <!-- Network nodes on globe surface -->
  <circle cx="155" cy="108" r="5" fill="#d4af55" opacity="0.9"/>
  <circle cx="248" cy="95" r="5" fill="#d4af55" opacity="0.9"/>
  <circle cx="280" cy="148" r="5" fill="#d4af55" opacity="0.9"/>
  <circle cx="248" cy="200" r="5" fill="#d4af55" opacity="0.9"/>
  <circle cx="155" cy="190" r="5" fill="#d4af55" opacity="0.9"/>
  <circle cx="120" cy="148" r="5" fill="#d4af55" opacity="0.9"/>
  <circle cx="178" cy="68" r="4" fill="#f5f0e1" opacity="0.7"/>
  <circle cx="225" cy="230" r="4" fill="#f5f0e1" opacity="0.7"/>
  <circle cx="115" cy="105" r="4" fill="#f5f0e1" opacity="0.7"/>
  <circle cx="290" cy="190" r="4" fill="#f5f0e1" opacity="0.7"/>

  <!-- Network connection lines -->
  <line x1="155" y1="108" x2="248" y2="95" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="248" y1="95" x2="280" y2="148" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="280" y1="148" x2="248" y2="200" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="248" y1="200" x2="155" y2="190" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="155" y1="190" x2="120" y2="148" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="120" y1="148" x2="155" y2="108" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <!-- Cross connections -->
  <line x1="155" y1="108" x2="248" y2="200" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
  <line x1="248" y1="95" x2="155" y2="190" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
  <line x1="120" y1="148" x2="280" y2="148" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
  <!-- Extra nodes -->
  <line x1="178" y1="68" x2="155" y2="108" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="178" y1="68" x2="248" y2="95" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="115" y1="105" x2="155" y2="108" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="115" y1="105" x2="120" y2="148" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="290" y1="190" x2="280" y2="148" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="290" y1="190" x2="248" y2="200" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="225" y1="230" x2="248" y2="200" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>
  <line x1="225" y1="230" x2="155" y2="190" stroke="rgba(245,240,225,0.4)" stroke-width="1"/>

  <!-- HTML angle brackets center -->
  <text x="200" y="156" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#d4af55" opacity="0.95">&lt;/&gt;</text>

  <!-- Bottom label -->
  <text x="200" y="278" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4af55" opacity="0.85" letter-spacing="2">WORLD WIDE WEB</text>
  <line x1="75" y1="268" x2="325" y2="268" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
