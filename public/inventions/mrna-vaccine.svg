<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="syringeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2d50"/>
      <stop offset="100%" stop-color="#0f1830"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="160" ry="120" fill="url(#glow)"/>

  <!-- Shield shape (right side) -->
  <path d="M 280 60 L 345 80 L 345 155 C 345 200, 312 228, 280 242 C 248 228, 215 200, 215 155 L 215 80 Z"
        fill="rgba(212,175,85,0.07)" stroke="#d4af55" stroke-width="2" stroke-opacity="0.6"/>

  <!-- DNA helix inside shield -->
  <path d="M 265 90 C 275 100, 295 110, 285 125 C 275 140, 265 148, 275 162 C 285 176, 295 183, 285 198 C 278 208, 270 212, 265 218"
        fill="none" stroke="#d4af55" stroke-width="2.5" stroke-opacity="0.85"/>
  <path d="M 295 90 C 285 100, 265 110, 275 125 C 285 140, 295 148, 285 162 C 275 176, 265 183, 275 198 C 282 208, 290 212, 295 218"
        fill="none" stroke="#f5f0e1" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- Rungs -->
  <line x1="267" y1="100" x2="293" y2="100" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="271" y1="115" x2="289" y2="115" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="276" y1="130" x2="284" y2="130" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="276" y1="148" x2="284" y2="148" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="271" y1="165" x2="289" y2="165" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="267" y1="180" x2="293" y2="180" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>
  <line x1="270" y1="200" x2="290" y2="200" stroke="rgba(212,175,85,0.55)" stroke-width="1.5"/>

  <!-- Syringe (left side) -->
  <!-- Needle -->
  <line x1="42" y1="148" x2="88" y2="148" stroke="#f5f0e1" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Tip -->
  <polygon points="42,148 52,144 52,152" fill="#f5f0e1" opacity="0.7"/>

  <!-- Barrel -->
  <rect x="88" y="125" width="110" height="46" rx="5" fill="url(#syringeBody)" stroke="#d4af55" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Liquid fill -->
  <rect x="90" y="127" width="75" height="42" rx="3" fill="rgba(212,175,85,0.18)" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>

  <!-- Plunger -->
  <rect x="195" y="122" width="14" height="52" rx="3" fill="rgba(245,240,225,0.15)" stroke="#f5f0e1" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Plunger flange -->
  <rect x="205" y="128" width="22" height="40" rx="2" fill="rgba(20,30,56,0.9)" stroke="#f5f0e1" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Barrel measurement lines -->
  <line x1="110" y1="127" x2="110" y2="133" stroke="#d4af55" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="125" y1="127" x2="125" y2="133" stroke="#d4af55" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="140" y1="127" x2="140" y2="133" stroke="#d4af55" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="155" y1="127" x2="155" y2="133" stroke="#d4af55" stroke-width="1" stroke-opacity="0.5"/>

  <!-- mRNA strand flowing from syringe -->
  <path d="M 198 148 C 210 140, 215 148, 215 148"
        fill="none" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="4,2"/>

  <!-- mRNA squiggle label -->
  <path d="M 100 195 Q 108 188, 116 195 Q 124 202, 132 195 Q 140 188, 148 195 Q 156 202, 164 195 Q 172 188, 180 195 Q 188 202, 196 195"
        fill="none" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Base pairs on mRNA -->
  <g stroke="#f5f0e1" stroke-width="1.5" stroke-opacity="0.5">
    <line x1="108" y1="192" x2="108" y2="202"/>
    <line x1="124" y1="200" x2="124" y2="210"/>
    <line x1="140" y1="192" x2="140" y2="202"/>
    <line x1="156" y1="200" x2="156" y2="210"/>
    <line x1="172" y1="192" x2="172" y2="202"/>
  </g>
  <text x="148" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#d4af55" opacity="0.6">mRNA</text>

  <!-- Cross/checkmark on shield -->
  <path d="M 262 155 L 273 166 L 298 138" fill="none" stroke="#d4af55" stroke-width="3" stroke-opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom label -->
  <text x="200" y="278" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4af55" opacity="0.85" letter-spacing="2">mRNA VACCINE</text>
  <line x1="90" y1="268" x2="310" y2="268" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
