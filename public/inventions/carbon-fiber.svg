<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
    <!-- Parallelogram tile pattern -->
    <pattern id="cfPattern" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <!-- Top-left bundle (going 45deg) -->
      <rect x="0" y="0" width="14" height="6" rx="1" fill="rgba(30,40,65,0.95)" transform="rotate(45,7,3)"/>
      <rect x="0" y="8" width="14" height="6" rx="1" fill="rgba(25,35,58,0.95)" transform="rotate(45,7,11)"/>
      <!-- Top-right bundle (going -45deg) -->
      <rect x="16" y="0" width="14" height="6" rx="1" fill="rgba(22,32,55,0.95)" transform="rotate(-45,23,3)"/>
      <rect x="16" y="8" width="14" height="6" rx="1" fill="rgba(18,28,48,0.95)" transform="rotate(-45,23,11)"/>
      <!-- Bottom mirror -->
      <rect x="0" y="16" width="14" height="6" rx="1" fill="rgba(22,32,55,0.95)" transform="rotate(-45,7,19)"/>
      <rect x="0" y="24" width="14" height="6" rx="1" fill="rgba(30,40,65,0.95)" transform="rotate(-45,7,27)"/>
      <rect x="16" y="16" width="14" height="6" rx="1" fill="rgba(25,35,58,0.95)" transform="rotate(45,23,19)"/>
      <rect x="16" y="24" width="14" height="6" rx="1" fill="rgba(18,28,48,0.95)" transform="rotate(45,23,27)"/>
    </pattern>
    <!-- Weave grid lines -->
    <pattern id="weaveLines" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <line x1="0" y1="16" x2="32" y2="16" stroke="rgba(212,175,85,0.08)" stroke-width="0.5"/>
      <line x1="16" y1="0" x2="16" y2="32" stroke="rgba(212,175,85,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Carbon fiber weave base fill -->
  <rect width="400" height="300" fill="url(#cfPattern)"/>
  <rect width="400" height="300" fill="url(#weaveLines)"/>

  <!-- Glow overlay -->
  <rect width="400" height="300" fill="url(#glow)"/>

  <!-- Diagonal fiber bundles - gold highlighted ones -->
  <!-- Set 1: NE direction fibers -->
  <g stroke="#d4af55" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round">
    <line x1="-10" y1="290" x2="290" y2="-10"/>
    <line x1="10" y1="290" x2="310" y2="-10"/>
    <line x1="30" y1="290" x2="330" y2="-10"/>
    <line x1="50" y1="290" x2="350" y2="-10"/>
    <line x1="70" y1="290" x2="370" y2="-10"/>
    <line x1="90" y1="290" x2="390" y2="-10"/>
    <line x1="110" y1="290" x2="410" y2="-10"/>
    <line x1="130" y1="290" x2="430" y2="-10"/>
    <line x1="150" y1="290" x2="450" y2="-10"/>
    <line x1="170" y1="290" x2="470" y2="-10"/>
  </g>

  <!-- Set 2: NW direction fibers (crossing) -->
  <g stroke="#d4af55" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round">
    <line x1="410" y1="290" x2="110" y2="-10"/>
    <line x1="390" y1="290" x2="90" y2="-10"/>
    <line x1="370" y1="290" x2="70" y2="-10"/>
    <line x1="350" y1="290" x2="50" y2="-10"/>
    <line x1="330" y1="290" x2="30" y2="-10"/>
    <line x1="310" y1="290" x2="10" y2="-10"/>
    <line x1="290" y1="290" x2="-10" y2="-10"/>
    <line x1="270" y1="290" x2="-30" y2="-10"/>
    <line x1="250" y1="290" x2="-50" y2="-10"/>
    <line x1="230" y1="290" x2="-70" y2="-10"/>
  </g>

  <!-- Block weave highlight cells (gold accent cells within the weave grid) -->
  <g fill="#d4af55" opacity="0.18">
    <rect x="48" y="48" width="10" height="10" rx="1" transform="rotate(45,53,53)"/>
    <rect x="96" y="16" width="10" height="10" rx="1" transform="rotate(45,101,21)"/>
    <rect x="144" y="64" width="10" height="10" rx="1" transform="rotate(45,149,69)"/>
    <rect x="192" y="32" width="10" height="10" rx="1" transform="rotate(45,197,37)"/>
    <rect x="240" y="80" width="10" height="10" rx="1" transform="rotate(45,245,85)"/>
    <rect x="288" y="48" width="10" height="10" rx="1" transform="rotate(45,293,53)"/>
    <rect x="336" y="96" width="10" height="10" rx="1" transform="rotate(45,341,101)"/>
    <rect x="64" y="128" width="10" height="10" rx="1" transform="rotate(45,69,133)"/>
    <rect x="112" y="96" width="10" height="10" rx="1" transform="rotate(45,117,101)"/>
    <rect x="160" y="144" width="10" height="10" rx="1" transform="rotate(45,165,149)"/>
    <rect x="208" y="112" width="10" height="10" rx="1" transform="rotate(45,213,117)"/>
    <rect x="256" y="160" width="10" height="10" rx="1" transform="rotate(45,261,165)"/>
    <rect x="304" y="128" width="10" height="10" rx="1" transform="rotate(45,309,133)"/>
    <rect x="352" y="176" width="10" height="10" rx="1" transform="rotate(45,357,181)"/>
    <rect x="80" y="208" width="10" height="10" rx="1" transform="rotate(45,85,213)"/>
    <rect x="128" y="176" width="10" height="10" rx="1" transform="rotate(45,133,181)"/>
    <rect x="176" y="224" width="10" height="10" rx="1" transform="rotate(45,181,229)"/>
    <rect x="224" y="192" width="10" height="10" rx="1" transform="rotate(45,229,197)"/>
    <rect x="272" y="240" width="10" height="10" rx="1" transform="rotate(45,277,245)"/>
    <rect x="320" y="208" width="10" height="10" rx="1" transform="rotate(45,325,213)"/>
  </g>

  <!-- Vignette overlay to emphasize center -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(10,11,20,0.7)"/>
  </radialGradient>
  <rect width="400" height="300" fill="url(#vignette)"/>

  <!-- Center text label area -->
  <rect x="120" y="112" width="160" height="76" rx="6" fill="rgba(10,11,20,0.7)" stroke="rgba(212,175,85,0.35)" stroke-width="1.5"/>
  <text x="200" y="145" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#d4af55" opacity="0.9" letter-spacing="1">CARBON</text>
  <text x="200" y="168" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#d4af55" opacity="0.9" letter-spacing="1">FIBER</text>

  <!-- Bottom label -->
  <text x="200" y="290" text-anchor="middle" font-family="monospace" font-size="10" fill="#d4af55" opacity="0.7" letter-spacing="3">COMPOSITE MATERIAL</text>
</svg>
