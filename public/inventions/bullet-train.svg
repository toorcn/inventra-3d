<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141e38"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4af55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trainBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="30%" stop-color="#f5f0e1"/>
      <stop offset="70%" stop-color="#d8d4c5"/>
      <stop offset="100%" stop-color="#b8b4a5"/>
    </linearGradient>
    <linearGradient id="trainBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3550"/>
      <stop offset="100%" stop-color="#141e38"/>
    </linearGradient>
    <clipPath id="trainClip">
      <path d="M 42 100 C 42 100, 70 85, 90 82 L 355 82 C 368 82, 375 90, 375 105 L 375 195 L 42 195 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="155" rx="180" ry="110" fill="url(#glow)"/>

  <!-- Speed lines (motion blur) -->
  <g stroke="rgba(212,175,85,0.12)" stroke-width="1.5">
    <line x1="0" y1="135" x2="42" y2="135"/>
    <line x1="0" y1="145" x2="42" y2="145"/>
    <line x1="0" y1="155" x2="42" y2="155"/>
    <line x1="0" y1="165" x2="42" y2="165"/>
    <line x1="0" y1="175" x2="42" y2="175"/>
  </g>
  <g stroke="rgba(212,175,85,0.07)" stroke-width="1">
    <line x1="0" y1="120" x2="30" y2="120"/>
    <line x1="0" y1="185" x2="30" y2="185"/>
  </g>

  <!-- Train body main -->
  <path d="M 42 100 C 42 100, 68 84, 90 82 L 355 82 C 368 82, 376 90, 376 105 L 376 195 L 42 195 Z"
        fill="url(#trainBody)"/>

  <!-- Blue stripe accent -->
  <path d="M 55 148 C 55 148, 68 145, 90 143 L 376 143 L 376 155 L 42 155 Z"
        fill="#1a4080" opacity="0.8"/>

  <!-- Aerodynamic nose detail -->
  <path d="M 42 100 C 58 95, 70 87, 90 82" fill="none" stroke="#c0bba8" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Nose tip highlight -->
  <path d="M 42 135 C 42 125, 44 115, 42 105" fill="none" stroke="#f5f0e1" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Bottom skirt -->
  <path d="M 42 195 L 376 195 L 376 208 C 368 215, 355 218, 345 218 L 75 218 C 65 218, 50 215, 42 208 Z"
        fill="url(#trainBottom)"/>

  <!-- Windows -->
  <rect x="105" y="93" width="28" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>
  <rect x="145" y="93" width="28" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>
  <rect x="185" y="93" width="28" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>
  <rect x="225" y="93" width="28" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>
  <rect x="265" y="93" width="28" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>
  <rect x="305" y="93" width="28" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>
  <rect x="345" y="93" width="22" height="18" rx="3" fill="rgba(180,210,255,0.25)" stroke="rgba(212,175,85,0.5)" stroke-width="1.5"/>

  <!-- Window reflections -->
  <rect x="106" y="94" width="6" height="16" rx="1" fill="white" opacity="0.15"/>
  <rect x="146" y="94" width="6" height="16" rx="1" fill="white" opacity="0.15"/>
  <rect x="186" y="94" width="6" height="16" rx="1" fill="white" opacity="0.15"/>

  <!-- Passenger windows lower deck -->
  <rect x="105" y="162" width="28" height="16" rx="3" fill="rgba(180,210,255,0.2)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>
  <rect x="145" y="162" width="28" height="16" rx="3" fill="rgba(180,210,255,0.2)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>
  <rect x="185" y="162" width="28" height="16" rx="3" fill="rgba(180,210,255,0.2)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>
  <rect x="225" y="162" width="28" height="16" rx="3" fill="rgba(180,210,255,0.2)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>
  <rect x="265" y="162" width="28" height="16" rx="3" fill="rgba(180,210,255,0.2)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>
  <rect x="305" y="162" width="28" height="16" rx="3" fill="rgba(180,210,255,0.2)" stroke="rgba(212,175,85,0.4)" stroke-width="1"/>

  <!-- Pantograph (on top) -->
  <line x1="270" y1="82" x2="265" y2="60" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="285" y1="82" x2="290" y2="60" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="265" y1="60" x2="290" y2="60" stroke="#d4af55" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Track rails -->
  <line x1="0" y1="225" x2="400" y2="225" stroke="#d4af55" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="0" y1="232" x2="400" y2="232" stroke="#d4af55" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Rail ties (sleepers) -->
  <g stroke="rgba(212,175,85,0.35)" stroke-width="2.5">
    <line x1="30" y1="220" x2="30" y2="237"/>
    <line x1="65" y1="220" x2="65" y2="237"/>
    <line x1="100" y1="220" x2="100" y2="237"/>
    <line x1="135" y1="220" x2="135" y2="237"/>
    <line x1="170" y1="220" x2="170" y2="237"/>
    <line x1="205" y1="220" x2="205" y2="237"/>
    <line x1="240" y1="220" x2="240" y2="237"/>
    <line x1="275" y1="220" x2="275" y2="237"/>
    <line x1="310" y1="220" x2="310" y2="237"/>
    <line x1="345" y1="220" x2="345" y2="237"/>
    <line x1="380" y1="220" x2="380" y2="237"/>
  </g>

  <!-- Shinkansen emblem -->
  <circle cx="72" cy="138" r="10" fill="rgba(212,175,85,0.15)" stroke="#d4af55" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="72" y="142" text-anchor="middle" font-family="serif" font-size="9" fill="#d4af55" opacity="0.8">N</text>

  <!-- Bottom label -->
  <text x="200" y="278" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4af55" opacity="0.85" letter-spacing="2">BULLET TRAIN</text>
  <line x1="100" y1="265" x2="300" y2="265" stroke="rgba(212,175,85,0.3)" stroke-width="1"/>
</svg>
